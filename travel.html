<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epal Travels — Employee Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- ════ EON AI COMPANION (modular — lives in /ai-companion) · New ════ -->
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }

<link rel="stylesheet" href="ai-companion/css/companion.css">
<link rel="stylesheet" href="ai-companion/css/home.css">
<link rel="stylesheet" href="ai-companion/css/animations.css">

<style>
:root{
  --bg:#f4f6fb; --bg2:#ffffff; --bg3:#f0f2f8; --border:#e4e8f0; --border2:#d0d6e8;
  --text:#1a2035; --text2:#5a6480; --text3:#9aa3bc;
  --accent:#2563eb; --accent2:#1d4ed8; --accent-light:#eff6ff;
  --green:#16a34a; --amber:#d97706; --red:#dc2626; --purple:#7c3aed; --teal:#0d9488;
  --travels:#2563eb;
  --sidebar-w:236px;
  --shadow:0 1px 4px rgba(30,50,100,.07); --shadow2:0 4px 16px rgba(30,50,100,.10); --shadow3:0 14px 40px rgba(30,50,100,.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#app{display:flex;height:100vh;overflow:hidden;}

/* ---------- Sidebar ---------- */
.side{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;flex-shrink:0;}
.side-logo{padding:15px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--bg2);z-index:5;}
.side-logo .ic{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;flex-shrink:0;font-style:italic;}
.side-logo .tx{font-size:14px;font-weight:700;line-height:1.15;}
.side-logo .sub{font-size:10px;color:var(--text3);margin-top:1px;}
.side-nav{padding:6px 0 30px;}
.nav-sec{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--text3);text-transform:uppercase;padding:14px 20px 5px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:13px;color:var(--text2);cursor:pointer;border-left:3px solid transparent;transition:background .12s,color .12s;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--accent-light);color:var(--accent);border-left-color:var(--accent);font-weight:600;}
.nav-item .ic{width:18px;text-align:center;font-size:14px;flex-shrink:0;}
.nav-item .arr{margin-left:auto;font-size:12px;transition:transform .15s;color:var(--text3);}
.nav-group.open .arr{transform:rotate(90deg);}
.nav-sub{display:none;}
.nav-group.open + .nav-sub{display:block;}
.nav-sub .nav-item{padding-left:42px;font-size:12.5px;}

/* ---------- Main ---------- */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{height:60px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;}
.topbar .crumb{font-size:15px;font-weight:700;}
.topbar .crumb small{display:block;font-size:11px;font-weight:500;color:var(--text3);margin-top:1px;}
.topbar .co-badge{margin-left:6px;font-size:11px;font-weight:700;color:var(--travels);background:#eff6ff;padding:4px 10px;border-radius:20px;}
.topbar .spacer{flex:1;}
.topbar .me{display:flex;align-items:center;gap:9px;}
.topbar .me .av{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.topbar .me .nm{font-size:12.5px;font-weight:700;line-height:1.2;}
.topbar .me .rl{font-size:11px;color:var(--text3);}
.content{flex:1;overflow-y:auto;padding:22px 26px 60px;}

/* ---------- Page header / toolbar ---------- */
.ph{display:flex;align-items:flex-end;gap:14px;margin-bottom:18px;flex-wrap:wrap;}
.ph h2{font-size:20px;font-weight:700;}
.ph .sub{font-size:12.5px;color:var(--text2);margin-top:3px;}
.ph .ph-r{margin-left:auto;display:flex;gap:9px;align-items:center;}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.toolbar .search{flex:1;min-width:180px;max-width:340px;position:relative;}
.toolbar .search input{width:100%;border:1px solid var(--border2);background:var(--bg2);border-radius:9px;padding:9px 12px 9px 32px;font-size:13px;font-family:inherit;color:var(--text);outline:none;}
.toolbar .search input:focus{border-color:var(--accent);}
.toolbar .search:before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.6;}
.toolbar select{border:1px solid var(--border2);background:var(--bg2);border-radius:9px;padding:9px 11px;font-size:13px;font-family:inherit;color:var(--text);outline:none;}
.toolbar .ct{font-size:12px;color:var(--text3);margin-left:auto;}

/* ---------- Buttons ---------- */
.btn{border:1px solid var(--border2);background:var(--bg2);border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text);display:inline-flex;align-items:center;gap:6px;transition:all .12s;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.primary:hover{background:var(--accent2);color:#fff;}
.btn.ghost{background:var(--bg3);}
.tbtn{border:0;background:none;cursor:pointer;font-size:14px;padding:4px 6px;border-radius:6px;line-height:1;}
.tbtn:hover{background:var(--bg3);}
.tbtn.danger:hover{background:#fef2f2;}

/* ---------- Table ---------- */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;}
table.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{text-align:left;color:var(--text2);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--bg3);white-space:nowrap;}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#fafbff;}
.tbl td.empty{text-align:center;color:var(--text3);padding:34px;font-style:italic;}
.tbl .mono{font-family:'DM Mono',ui-monospace,monospace;font-size:12px;color:var(--text2);}
.tbl .strong{font-weight:600;}

/* ---------- Pills ---------- */
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.pill.ok{background:rgba(22,163,74,.13);color:#16a34a;}
.pill.warn{background:rgba(217,119,6,.15);color:#d97706;}
.pill.bad{background:rgba(220,38,38,.13);color:#dc2626;}
.pill.info{background:rgba(37,99,235,.13);color:#2563eb;}
.pill.purple{background:rgba(124,58,237,.13);color:#7c3aed;}
.pill.muted{background:var(--bg3);color:var(--text2);}

/* ---------- "New" badge — marks anything added during prototyping ---------- */
.badge-new{display:inline-block;font-size:8.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;
  background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;padding:1px 5px;border-radius:6px;
  vertical-align:middle;margin-left:6px;box-shadow:0 1px 3px rgba(22,163,74,.4);}
.nav-item .badge-new{margin-left:auto;}
.nav-sub .nav-item .badge-new{margin-left:auto;}
h2 .badge-new,h3 .badge-new{font-size:9.5px;}

/* ---------- KPI cards / dashboard ---------- */
.hero{background:linear-gradient(120deg,#1d4ed8,#2563eb 55%,#7c3aed);color:#fff;border-radius:16px;padding:22px 24px;margin-bottom:20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;box-shadow:0 10px 26px rgba(37,99,235,.28);}
.hero .av{width:60px;height:60px;border-radius:15px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;}
.hero h2{font-size:21px;font-weight:700;}
.hero .sub{opacity:.92;font-size:13px;margin-top:4px;}
.hero .today{margin-left:auto;text-align:right;font-size:12.5px;opacity:.95;}
.hero .today b{display:block;font-size:15px;margin-top:2px;}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:15px;margin-bottom:20px;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);}
.kpi .lbl{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:7px;}
.kpi .val{font-size:26px;font-weight:700;margin-top:7px;font-family:'DM Mono',ui-monospace,monospace;}
.kpi .meta{font-size:11.5px;color:var(--text3);margin-top:3px;}
.two{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;align-items:start;}
@media(max-width:980px){.two{grid-template-columns:1fr;}}
.box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);margin-bottom:18px;}
.box h3{font-size:14.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.box h3 .sp{margin-left:auto;font-size:12px;font-weight:500;color:var(--accent);cursor:pointer;}

/* ---------- Kanban (visa board / tasks) ---------- */
.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;}
.kcol{background:var(--bg3);border-radius:13px;padding:12px;min-width:236px;flex:1;min-height:140px;}
.kcol.over{outline:2px dashed var(--accent);outline-offset:-4px;}
.kcol-h{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);margin:3px 5px 11px;}
.kdot{width:9px;height:9px;border-radius:50%;}
.kct{margin-left:auto;background:rgba(0,0,0,.07);border-radius:10px;padding:1px 9px;font-size:11px;}
.kcard{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow);transition:transform .1s,box-shadow .1s;}
.kcard:hover{transform:translateY(-2px);box-shadow:var(--shadow2);}
.kcard.dragging{opacity:.45;}
.kcard .t{font-size:13px;font-weight:700;margin-bottom:4px;}
.kcard .d{font-size:11.5px;color:var(--text2);line-height:1.4;}
.kcard .foot{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap;}
.kcard .money{font-weight:700;font-size:12.5px;color:var(--green);}
.kempty{font-size:12px;color:var(--text3);text-align:center;padding:14px 0;}

/* ---------- Modal ---------- */
.modal{position:fixed;inset:0;background:rgba(20,24,40,.5);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:80;padding:20px;}
.modal.open{display:flex;}
.modal-box{background:var(--bg2);border-radius:16px;width:600px;max-width:100%;max-height:90vh;overflow:auto;box-shadow:var(--shadow3);}
.modal-h{padding:17px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--bg2);z-index:2;}
.modal-h .ti{font-size:16px;font-weight:700;}
.modal-h .x{margin-left:auto;border:0;background:var(--bg3);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;color:var(--text2);}
.modal-b{padding:18px 22px;}
.form{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field.full{grid-column:1/-1;}
@media(max-width:620px){.form{grid-template-columns:1fr;}}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:600;}
.field input,.field select,.field textarea{width:100%;box-sizing:border-box;border:1px solid var(--border2);background:var(--bg);border-radius:9px;padding:9px 12px;font-size:13px;font-family:inherit;color:var(--text);outline:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:var(--bg2);}
.modal-f{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg2);}

/* ---------- ESS personal ---------- */
.bal{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px;margin-bottom:18px;}
.bal .b{border:1px solid var(--border);border-radius:12px;padding:15px;text-align:center;background:var(--bg2);box-shadow:var(--shadow);}
.bal .b .n{font-size:24px;font-weight:700;color:var(--accent);}
.bal .b .t{font-size:12px;color:var(--text2);margin-top:4px;}
.pay{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
@media(max-width:760px){.pay{grid-template-columns:1fr;}}
.pay .ph2{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);margin-bottom:8px;}
.pay .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--border);font-size:13px;}
.pay .row.tot{border-bottom:none;font-weight:700;font-size:15px;margin-top:8px;border-top:2px solid var(--border);padding-top:12px;}
.notice{display:flex;gap:13px;padding:13px 0;border-bottom:1px solid var(--border);}
.notice:last-child{border-bottom:none;}
.notice .ic{font-size:19px;}
.notice .ti{font-weight:600;font-size:13.5px;}
.notice .bd{font-size:12.5px;color:var(--text2);margin-top:3px;line-height:1.5;}
.notice .dt{font-size:11px;color:var(--text3);margin-top:4px;}
.addbar{display:flex;gap:9px;margin-bottom:14px;}
.addbar input{flex:1;border:1px solid var(--border2);background:var(--bg2);border-radius:9px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;}
.addbar input:focus{border-color:var(--accent);}
.mv{border:1px solid var(--border2);background:var(--bg2);border-radius:6px;width:24px;height:24px;cursor:pointer;font-size:12px;line-height:1;}
.mv:hover{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>
<div id="app">
  <aside class="side">
    <div class="side-logo">
      <div class="ic">e</div>
      <div><div class="tx">Epal Travels</div><div class="sub">Employee Portal</div></div>
    </div>
    <nav class="side-nav" id="side-nav"></nav>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="crumb" id="crumb">Dashboard<small id="crumb-sub">Welcome back</small></div>
      <span class="co-badge">🏢 Epal Travels</span>
      <div class="spacer"></div>
      <div class="me">
        <div class="av" id="me-av">IH</div>
        <div><div class="nm" id="me-nm">Imran Hossain</div><div class="rl" id="me-rl">Travel Consultant</div></div>
      </div>
    </header>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- Modal -->
<div class="modal" id="modal" onclick="if(event.target===this)TR.closeModal()">
  <div class="modal-box">
    <div class="modal-h"><span class="ti" id="modal-ti">Form</span><button class="x" onclick="TR.closeModal()">✕</button></div>
    <div class="modal-b"><div class="form" id="modal-form"></div></div>
    <div class="modal-f"><button class="btn" onclick="TR.closeModal()">Cancel</button><button class="btn primary" id="modal-save">Save</button></div>
  </div>
</div>

<script>
"use strict";
/* ════════════════════════════════════════════════════════════════════
   EPAL TRAVELS — Employee Portal (standalone UI prototype)
   Field names / statuses mirror the real Laravel app (epal_erp_soft).
   All data is mock + localStorage-backed; every module is interactive.
   ════════════════════════════════════════════════════════════════════ */
const EMP={name:'Imran Hossain', id:'EMP-2042', desig:'Travel Consultant', dept:'Epal Travels',
  initials:'IH', manager:'Fahim Rahman', email:'imran.hossain@epalgroup.com'};
const TODAY='Sunday, 28 June 2026';

/* ---------- tiny helpers ---------- */
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const money=n=>'৳'+Number(n||0).toLocaleString('en-IN');
const pretty=s=>String(s==null?'':s).replace(/[_-]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
const uid=p=>p+'-'+String(Date.now()).slice(-5)+Math.floor(Math.random()*90+10);
const sum=(arr,f)=>arr.reduce((a,x)=>a+(Number(f(x))||0),0);

/* ---------- option pools ---------- */
const AIRLINES=['Biman Bangladesh','US-Bangla','Air Astra','Emirates','Qatar Airways','Saudia','Malaysia Airlines','IndiGo','Turkish Airlines'];
const AIRPORTS=['DAC — Dhaka','CXB — Cox’s Bazar','CGP — Chattogram','DXB — Dubai','JED — Jeddah','RUH — Riyadh','KUL — Kuala Lumpur','DOH — Doha','SIN — Singapore','IST — Istanbul'];
const COUNTRIES=['Bangladesh','UAE','Saudi Arabia','Malaysia','Qatar','Singapore','Turkey','Thailand','India','UK','Canada','Schengen'];
const OFFICERS=['Imran Hossain','Fatema Akter','Mitu Rani','Tareq Aziz'];
const VENDORS_LIST=['Galaxy Travels','SkyLink GSA','Dubai Holidays Ltd','Al-Haramain Agency','Portal: Sabre','Portal: Galileo'];

/* ════════════════ RESOURCE SCHEMAS ════════════════ */
const RES={
  /* ---- Air Ticketing: inventory ---- */
  'tickets':{
    label:'Ticket Inventory', icon:'🎫', idPrefix:'TKT',
    title:'Ticket Inventory', sub:'Air ticket routes, pricing & stock',
    search:['route','airline','vendor'], statusKey:'status', statusOpts:['Active','Inactive'],
    badgeMaps:{status:{Active:'ok',Inactive:'muted'}},
    columns:[
      {k:'route',t:'Route',strong:true},{k:'airline',t:'Airline'},{k:'vendor',t:'Vendor / Portal'},
      {k:'price',t:'Cost Price',money:true},{k:'qty',t:'Stock'},{k:'sold',t:'Sold'},
      {k:'remaining',t:'Remaining',compute:r=>(+r.qty||0)-(+r.sold||0)},
      {k:'status',t:'Status',badge:'status'}
    ],
    fields:[
      {k:'route',t:'Ticket Route',type:'text',req:true,full:true},
      {k:'airline',t:'Airline',type:'select',opts:AIRLINES,req:true},
      {k:'vendor',t:'Vendor / Portal',type:'select',opts:VENDORS_LIST},
      {k:'price',t:'Cost Price (৳)',type:'number',req:true},
      {k:'sale',t:'Sale Price (৳)',type:'number'},
      {k:'qty',t:'Total Stock Qty',type:'number',req:true},
      {k:'sold',t:'Sold Qty',type:'number'},
      {k:'status',t:'Status',type:'select',opts:['Active','Inactive']}
    ],
    seed:[
      {id:'TKT-1001',route:'Dhaka → Dubai (DAC-DXB)',airline:'Emirates',vendor:'Dubai Holidays Ltd',price:48000,sale:54000,qty:40,sold:23,status:'Active'},
      {id:'TKT-1002',route:'Dhaka → Jeddah (DAC-JED)',airline:'Saudia',vendor:'Al-Haramain Agency',price:62000,sale:69000,qty:60,sold:51,status:'Active'},
      {id:'TKT-1003',route:'Dhaka → Kuala Lumpur (DAC-KUL)',airline:'Malaysia Airlines',vendor:'Portal: Sabre',price:39000,sale:45000,qty:30,sold:12,status:'Active'},
      {id:'TKT-1004',route:'Dhaka → Doha (DAC-DOH)',airline:'Qatar Airways',vendor:'Galaxy Travels',price:51000,sale:58000,qty:25,sold:25,status:'Inactive'},
      {id:'TKT-1005',route:'Dhaka → Riyadh (DAC-RUH)',airline:'US-Bangla',vendor:'SkyLink GSA',price:57000,sale:63000,qty:35,sold:8,status:'Active'}
    ]
  },
  /* ---- Air Ticketing: sales ---- */
  'ticket-sales':{
    label:'Ticket Sales', icon:'🧾', idPrefix:'TS',
    title:'Ticket Sales', sub:'Direct ticket sales & invoices',
    search:['customer','route','airline'], statusKey:'paymentStatus', statusOpts:['paid','partial','due'],
    badgeMaps:{paymentStatus:{paid:'ok',partial:'warn',due:'bad'},status:{confirmed:'ok',pending:'warn',cancelled:'bad'}},
    columns:[
      {k:'id',t:'Invoice',mono:true},{k:'date',t:'Date'},{k:'customer',t:'Customer',strong:true},
      {k:'route',t:'Route'},{k:'pax',t:'Pax'},{k:'sale',t:'Sale',money:true},
      {k:'profit',t:'Profit',money:true,compute:r=>(+r.sale||0)-(+r.cost||0)},
      {k:'status',t:'Status',badge:'status'},{k:'paymentStatus',t:'Payment',badge:'paymentStatus'}
    ],
    fields:[
      {k:'date',t:'Sale Date',type:'date',req:true},
      {k:'customer',t:'Customer',type:'select',opts:()=>DB['customers'].map(c=>c.name),req:true},
      {k:'route',t:'Route',type:'select',opts:()=>DB['tickets'].map(t=>t.route),req:true},
      {k:'airline',t:'Airline',type:'select',opts:AIRLINES},
      {k:'pax',t:'Passengers',type:'number'},
      {k:'cost',t:'Cost (৳)',type:'number'},
      {k:'sale',t:'Sale Price (৳)',type:'number',req:true},
      {k:'status',t:'Booking Status',type:'select',opts:['confirmed','pending','cancelled']},
      {k:'paymentStatus',t:'Payment Status',type:'select',opts:['paid','partial','due']}
    ],

const DB={};
function lkey(k){return 'epal_tr_'+k;}
function loadRes(k,seed){ try{const r=localStorage.getItem(lkey(k)); if(r) return JSON.parse(r);}catch(e){} return (seed||[]).map(x=>Object.assign({},x)); }
function saveRes(k){ try{localStorage.setItem(lkey(k),JSON.stringify(DB[k]||[]));}catch(e){} }
Object.keys(RES).forEach(k=>{ DB[k]=loadRes(k,RES[k].seed); });

const LABELS={}; (function walk(a){a.forEach(n=>{if(n.kids){LABELS[n.grp]=n.label;walk(n.kids);}else if(n.id)LABELS[n.id]=n.label;});})(NAV);

const nb=n=>n&&n.nw?'<span class="badge-new">New</span>':'';   /* New badge helper · New */
function buildNav(){
  let html='';
  NAV.forEach(n=>{
    if(n.sec){ html+=`<div class="nav-sec">${esc(n.sec)}</div>`; return; }
    if(n.grp){
      html+=`<div class="nav-item nav-group" data-grp="${n.grp}" onclick="TR.toggleGrp('${n.grp}')"><span class="ic">${n.ic}</span> ${esc(n.label)} ${nb(n)}<span class="arr">›</span></div>`;
      html+=`<div class="nav-sub" data-sub="${n.grp}">`;
      n.kids.forEach(k=>{ html+=`<div class="nav-item" data-id="${k.id}" onclick="TR.show('${k.id}')"><span class="ic">${k.ic}</span> ${esc(k.label)} ${nb(k)}</div>`; });
      html+=`</div>`;
      return;
    }
    html+=`<div class="nav-item" data-id="${n.id}" onclick="TR.show('${n.id}')"><span class="ic">${n.ic}</span> ${esc(n.label)} ${nb(n)}</div>`;
  });
  $('side-nav').innerHTML=html;
}

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.querySelector(`.nav-item[data-id="${id}"]`); if(el){ el.classList.add('active');

/* PAGES = pages registered by modular features (see window.TravelPortal). New */
const PAGES={}, SUBS={};
let current='dashboard';
function show(id){
  current=id;
  setActiveNav(id);
  const lbl=LABELS[id]||'Dashboard';
  $('crumb').innerHTML=esc(lbl)+`<small>${esc((RES[id]&&RES[id].sub)||subFor(id))}</small>`;
  if(PAGES[id]) return PAGES[id].render($('content'));   // modular feature page · New
  if(id==='dashboard') return renderDashboard();
  if(id==='ess-attendance') return renderAttendance();
  if(id==='ess-leave') return renderLeave();
  if(id==='ess-payslip') return renderPayslip();
  if(id==='ess-tasks') return renderTasks();
  if(id==='ess-notices') return renderNotices();
  const r=RES[id]; if(!r){ $('content').innerHTML='<div class="box">Coming soon.</div>'; return; }
  if(r.view==='board') return renderBoard(r);
  return renderTable(r);
}
function subFor(id){ return SUBS[id]||({'dashboard':'Welcome back','ess-attendance':'Your monthly attendance','ess-leave':'Leave balance & history','ess-payslip':'Salary breakdown','ess-tasks':'Your personal task board','ess-notices':'Company announcements'})[id]||''; }

/* ════════════════ GENERIC TABLE ════════════════ */
function val(r,c,row){
  if(c.compute) return c.money?money(c.compute(row)):esc(c.compute(row));
  let v=row[c.k];
  if(c.badge){ const cls=((r.badgeMaps&&r.badgeMaps[c.badge])||{})[v]||'muted'; return `<span class="pill ${cls}">${esc(pretty(v))}</span>`; }
  if(c.money) return money(v);
  if(c.mono) return `<span class="mono">${esc(v)}</span>`;
  if(c.strong) return `<span class="strong">${esc(v)}</span>`;
  return esc(v);
}
function filtered(r){
  let d=(DB[r.key]||[]).slice(); const u=ui(r.key);
  if(u.q){ const q=u.q.toLowerCase(); d=d.filter(row=>(r.search||[]).some(f=>String(row[f]==null?'':row[f]).toLowerCase().includes(q))); }
  if(u.status && r.statusKey){ d=d.filter(row=>row[r.statusKey]===u.status); }
  return d;
}
function toolbar(r){
  const u=ui(r.key);
  const statusSel = r.statusOpts ? `<select onchange="TR.setStatus('${r.key}',this.value)"><option value="">All ${esc(pretty(r.statusKey))}</option>${r.statusOpts.map(o=>`<option value="${esc(o)}"${u.status===o?' selected':''}>${esc(pretty(o))}</option>`).join('')}</select>` : '';
  return `<div class="toolbar">
    <div class="search"><input id="tb-search" placeholder="Search ${esc(r.label.toLowerCase())}…" value="${esc(u.q)}" oninput="TR.search('${r.key}',this.value)"></div>
    ${statusSel}
    <button class="btn primary" onclick="TR.openNew('${r.key}')">＋ New</button>
    <span class="ct" id="tb-ct"></span>
  </div>`;
}
function renderTable(r){
  r.key=r.key||keyOf(r);
  const data=filtered(r);
  const cols=r.columns;
  const head=cols.map(c=>`<th>${esc(c.t)}</th>`).join('')+'<th style="text-align:right">Actions</th>';
  const body=data.map(row=>{
    const tds=cols.map(c=>`<td>${val(r,c,row)}</td>`).join('');
    const extra=(r.rowActions||[]).map(a=>`<button class="tbtn" title="${esc(a.label)}" onclick="TR.action('${r.key}','${a.key}','${row.id}')">${a.icon}</button>`).join('');
    return `<tr>${tds}<td style="text-align:right;white-space:nowrap">${extra}<button class="tbtn" title="Edit" onclick="TR.edit('${r.key}','${row.id}')">✏️</button><button class="tbtn danger" title="Delete" onclick="TR.del('${r.key}','${row.id}')">🗑</button></td></tr>`;
  }).join('')||`<tr><td class="empty" colspan="${cols.length+1}">No records yet. Click “＋ New” to add one.</td></tr>`;
  $('content').innerHTML=`<div class="ph"><div><h2>${esc(r.title)}${r.nw?' <span class="badge-new">New</span>':''}</h2><div class="sub">${esc(r.sub||'')}</div></div></div>
    ${toolbar(r)}
    <div class="card"><table class="tbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
  const ct=$('tb-ct'); if(ct) ct.textContent=data.length+' record'+(data.length===1?'':'s');
}
function keyOf(r){ return Object.keys(RES).find(k=>RES[k]===r); }

let dragId=null;
function renderBoard(r){

/* ════════════════ MODAL FORM ════════════════ */
let modalKey=null, modalId=null;
function openForm(key,id){
  const r=RES[key]; if(!r) return;
  modalKey=key; modalId=(id==null?null:id);
  const row=(id!=null)?(DB[key].find(x=>x.id===id)||{}):{};
  $('modal-ti').textContent=(id!=null?'Edit ':'New ')+r.label.replace(/s$/,'');
  $('modal-form').innerHTML=r.fields.map(f=>{
    const v=row[f.k]!=null?row[f.k]:'';
    const opts=typeof f.opts==='function'?f.opts():f.opts;
    let input;
    if(f.type==='select'){
      input=`<select id="f_${f.k}"><option value="">— select —</option>${(opts||[]).map(o=>{const ov=(o&&o.v!=null)?o.v:o;const ot=(o&&o.t!=null)?o.t:pretty(o);return `<option value="${esc(ov)}"${String(ov)===String(v)?' selected':''}>${esc(ot)}</option>`;}).join('')}</select>`;
    } else if(f.type==='textarea'){
      input=`<textarea id="f_${f.k}" rows="3">${esc(v)}</textarea>`;
    } else {
      const t=f.type==='number'?'number':f.type==='date'?'date':'text';
      input=`<input id="f_${f.k}" type="${t}" value="${esc(v)}">`;
    }
    return `<div class="field${f.full?' full':''}"><label>${esc(f.t)}${f.req?' <span style="color:var(--red)">*</span>':''}</label>${input}</div>`;
  }).join('');
  $('modal-save').onclick=()=>saveForm();
  $('modal').classList.add('open');
}
function saveForm(){
  const r=RES[modalKey]; const data={};
  for(const f of r.fields){ const el=$('f_'+f.k); let v=el?el.value:''; if(f.type==='number') v=(v===''?0:Number(v)); data[f.k]=v; }
  for(const f of r.fields){ if(f.req && (data[f.k]===''||data[f.k]==null)){ alert('Please fill required field: '+f.t); return; } }
  if(modalId!=null){ const row=DB[modalKey].find(x=>x.id===modalId); Object.assign(row,data); }
  else { data.id=uid(r.idPrefix||'ID'); DB[modalKey].unshift(data); }
  saveRes(modalKey); closeModal(); show(modalKey===current?current:modalKey);
}
function closeModal(){ $('modal').classList.remove('open'); modalKey=null; modalId=null; }

/* ════════════════ PUBLIC API (inline handlers) ════════════════ */
const TR={
  show, toggleGrp,
  openNew:k=>openForm(k,null),
  edit:(k,id)=>openForm(k,id),
  closeModal,
  del:(k,id)=>{ if(!confirm('Delete this record?'))return; DB[k]=DB[k].filter(x=>x.id!==id); saveRes(k); show(k); },
  action:(k,act,id)=>{ const r=RES[k]; const a=(r.rowActions||[]).find(x=>x.key===act); const row=DB[k].find(x=>x.id===id); if(a&&row){ a.run(row); saveRes(k); show(k); } },
  search:(k,v)=>{ ui(k).q=v; const r=RES[k]; (r.view==='board'?renderBoard:renderTable)(r); const s=$('tb-search'); if(s){ s.focus(); s.setSelectionRange(s.value.length,s.value.length); } },
  setStatus:(k,v)=>{ ui(k).status=v; renderTable(RES[k]); },
  /* board DnD */
  kdragstart:(e,id)=>{ dragId=id; e.dataTransfer.effectAllowed='move'; e.currentTarget.classList.add('dragging'); },
  kdragend:(e)=>{ e.currentTarget.classList.remove('dragging'); },
  kover:(e,el)=>{ e.preventDefault(); el.classList.add('over'); },
  kdrop:(e,k,st,el)=>{ e.preventDefault(); el.classList.remove('over'); const row=DB[k].find(x=>x.id===dragId); if(row&&row[RES[k].statusKey]!==st){ row[RES[k].statusKey]=st; saveRes(k); renderBoard(RES[k]); } dragId=null; },
  /* tasks */
  taskAdd:()=>{ const i=$('task-in'); if(!i||!i.value.trim())return; DB['_tasks'].unshift({id:uid('TKM'),t:i.value.trim(),p:'Medium',s:'todo'}); saveRes('_tasks'); renderTasks(); },
  taskMove:(id,s)=>{ const t=DB['_tasks'].find(x=>x.id===id); if(t){ t.s=s; saveRes('_tasks'); renderTasks(); } },
  taskDel:(id)=>{ DB['_tasks']=DB['_tasks'].filter(x=>x.id!==id); saveRes('_tasks'); renderTasks(); }
};
window.TR=TR;

/* assign key onto each schema for convenience */
Object.keys(RES).forEach(k=>RES[k].key=k);

/* ════════════════ MODULAR FEATURE API (window.TravelPortal) · New ════════════════
   Lets self-contained features in /features/<name>/ plug into this portal without
   editing the core: register a page renderer or a full CRUD resource, add nav
   entries (optionally flagged `nw:true` to show a "New" badge), reuse helpers. */
function findGroup(grp){ return NAV.find(n=>n.grp===grp); }
function addGroup(o){ // {grp,label,ic,nw,section}
  if(findGroup(o.grp)) return findGroup(o.grp);
  const g={grp:o.grp,ic:o.ic||'📦',label:o.label||o.grp,kids:[],nw:!!o.nw};
  const wsIdx=NAV.findIndex(n=>n.sec==='My Workspace');
  if(o.section && !NAV.some(n=>n.sec===o.section)){ NAV.splice(wsIdx<0?NAV.length:wsIdx,0,{sec:o.section}); }
  const at=NAV.findIndex(n=>n.sec==='My Workspace'); NAV.splice(at<0?NAV.length:at,0,g);
  return g;
}
function addNavItem(o){ // {id,label,ic,group,nw}
  const item={id:o.id,ic:o.ic||'•',label:o.label||o.id,nw:!!o.nw};
  if(o.group){ const g=findGroup(o.group)||addGroup({grp:o.group,label:o.group}); g.kids.push(item); }
  else { const at=NAV.findIndex(n=>n.sec==='My Workspace'); NAV.splice(at<0?NAV.length:at,0,item); }
  LABELS[o.id]=o.label||o.id;
  return item;
}
const TravelPortal={
  /* shared helpers + data so features stay consistent with the core */
  helpers:{$,esc,money,pretty,uid,sum},
  pools:{AIRLINES,AIRPORTS,COUNTRIES,OFFICERS,VENDORS_LIST},
  DB,RES,UI,ui,
  store:{lkey,loadRes,saveRes},
  openForm,closeModal,go:show,filtered,renderTable,renderBoard,
  /* register a custom page (any HTML) under an id + nav entry */
  registerPage(o){ // {id,label,sub,render,group,ic,nw,section}
    PAGES[o.id]={render:o.render}; LABELS[o.id]=o.label||o.id; if(o.sub)SUBS[o.id]=o.sub;
    if(o.group||o.section!==undefined||o.standalone) addNavItem({id:o.id,label:o.label,ic:o.ic,group:o.group,nw:o.nw});
    this.refreshNav(); return PAGES[o.id];
  },
  /* register a full CRUD resource — gets the generic table/board engine free */
  registerResource(key,schema,nav){ // nav:{group,ic,nw}
    schema.key=key; RES[key]=schema; if(!DB[key]) DB[key]=loadRes(key,schema.seed);
    if(nav) addNavItem({id:key,label:schema.label||key,ic:nav.ic||schema.icon,group:nav.group,nw:nav.nw});
    this.refreshNav(); return schema;
  },
  addGroup,addNavItem,
  refreshNav(){ buildNav(); setActiveNav(current); },
  onReady(cb){ try{cb(TravelPortal);}catch(e){console.error('[TravelPortal] feature error:',e);} }
};
window.TravelPortal=TravelPortal;

/* ---- boot ---- */
$('me-av').textContent=EMP.initials; $('me-nm').textContent=EMP.name; $('me-rl').textContent=EMP.desig;
buildNav();
show('dashboard');
</script>
